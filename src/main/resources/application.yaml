spring:
  application:
    name: Market
  datasource:
    url: "jdbc:postgresql://localhost:5432/market"
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  liquibase:
    drop-first: false
app:
  images:
    avatars: .\images\avatars
    collections: .\images\collections
    skins: .\images\skins
    news: .\images\news
